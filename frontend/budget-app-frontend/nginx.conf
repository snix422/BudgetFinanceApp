server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API: front woła ten sam origin (VITE_API_URL=/api), więc przekazujemy
    # /api/* do backendu w sieci kontenerów.
    # 'api' to nazwa serwisu z docker-compose.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: każda nieznana ścieżka -> index.html, żeby React Router obsłużył routing.
    # Bez tego odświeżenie/deep-link na podstronie (np. /budgets/3, /shared/{token}) daje 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Zasoby z hashem w nazwie (Vite) można cache'ować długo i niezmiennie.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}