services:
  # --- 1. FRONTEND (React) ---
  web:
    build:
      context: ./frontend/budget-app-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "3000:80"
    depends_on:
      - api

  # --- 2. BACKEND (.NET API) ---
  api:
    build:
      context: ./backendv2/BudgetApp
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # ZOBACZ ZMIANĘ PONIŻEJ:
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;

  # --- 3. BAZA DANYCH (SQL Server) ---
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_container
    environment:
      - ACCEPT_EULA=Y # Musisz zaakceptować licencję
      - MSSQL_SA_PASSWORD=${DB_PASSWORD} # Hasło administratora (musi być silne!)
    ports:
      - "1433:1433" # Wystawiamy port, żebyś mógł się połączyć przez SSMS
    volumes:
      - mssql_data:/var/opt/mssql # To jest Twój "dysk twardy" (czytaj niżej)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P"${DB_PASSWORD}" -No -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# Definicja wolumenu (dysku)
volumes:
  mssql_data:
