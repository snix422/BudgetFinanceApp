version: "3.8"

services:
  # --- 1. FRONTEND (React) ---
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  # --- 2. BACKEND (.NET API) ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db # Backend czeka, aż baza wstanie
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # ZOBACZ ZMIANĘ PONIŻEJ:
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;

  # --- 3. BAZA DANYCH (SQL Server) ---
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_container
    environment:
      - ACCEPT_EULA=Y # Musisz zaakceptować licencję
      - MSSQL_SA_PASSWORD=TwojeHaslo123! # Hasło administratora (musi być silne!)
    ports:
      - "1433:1433" # Wystawiamy port, żebyś mógł się połączyć przez SSMS
    volumes:
      - mssql_data:/var/opt/mssql # To jest Twój "dysk twardy" (czytaj niżej)

# Definicja wolumenu (dysku)
volumes:
  mssql_data:
